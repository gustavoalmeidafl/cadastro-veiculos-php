<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Veículos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <h2 class="mb-4">Cadastro de Veículos</h2>

  <form action="php/inserir.php" method="POST" class="row g-3">

    <div class="col-md-4">
      <label class="form-label">Placa</label>
      <input name="placa" class="form-control" required maxlength="7">
    </div>

    <div class="col-md-4">
      <label class="form-label">Marca</label>
      <input name="marca" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Modelo</label>
      <input name="modelo" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Ano Fabricação</label>
      <input type="number" name="ano_fabricacao" class="form-control" min="1900" max="2026" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Ano Modelo</label>
      <input type="number" name="ano_modelo" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Cor</label>
      <input name="cor" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Combustível</label>
      <input name="combustivel" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Quilometragem</label>
      <input type="number" name="quilometragem" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Chassi</label>
      <input name="chassi" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Renavam</label>
      <input name="renavam" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Data</label>
      <input type="date" name="data_cadastro" class="form-control" required>
    </div>

    <div class="col-12">
      <label class="form-label">Observações</label>
      <textarea name="observacoes" class="form-control" required></textarea>
    </div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary">Cadastrar</button>
      <a href="lista.html" class="btn btn-secondary">Ver veículos</a>
    </div>

  </form>
</div>

</body>
</html>
